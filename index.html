<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dannielle's 18th</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Monsieur+La+Doulaise&family=Montserrat:wght@200;300;400&display=swap');

        :root {
            --nude-bg: #FAF5F2;
            --gold-luxe: #C5A059; 
            --deep-espresso: #2D241E;
            --soft-taupe: #8E847C;
            --p1: #F4E4E1; --p2: #E8D5CC; --p3: #DDC3B6; --p4: #C2A69A;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--nude-bg);
            color: var(--deep-espresso);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- HERO: JUST THE NAME --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hero h1 {
            font-family: 'Monsieur La Doulaise', cursive;
            font-size: clamp(4.5rem, 25vw, 10rem);
            color: var(--gold-luxe);
            margin: 0;
            font-weight: 400;
            line-height: 0.8;
        }

        .hero p {
            font-family: 'Cinzel', serif;
            letter-spacing: 12px;
            font-size: 0.8rem;
            margin-top: 20px;
            text-transform: uppercase;
            color: var(--deep-espresso);
        }

        /* --- THE COUNTDOWN: PUSHED AWAY --- */
        .spacing-block {
            padding: 150px 20px; /* High whitespace to separate sections */
        }

        .timer-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
        }

        .time-num {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--gold-luxe);
        }

        .time-label {
            font-size: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--soft-taupe);
        }

        /* --- THE MAP --- */
        .venue-section { padding: 100px 0 0 0; background: white; }
        .venue-title { font-family: 'Cinzel', serif; letter-spacing: 8px; font-size: 1.2rem; }
        .address { font-size: 0.75rem; color: var(--soft-taupe); margin: 10px 0 40px; letter-spacing: 1px; }
        
        .map-frame {
            width: 100%;
            height: 400px;
            border: none;
            filter: grayscale(0.3) contrast(1.1);
        }

        /* --- DRESS CODE --- */
        .dress-code { padding: 120px 20px; }
        .swatch-row { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.05); }

        /* --- RSVP --- */
        .rsvp-box {
            background: var(--deep-espresso);
            color: white;
            padding: 80px 30px;
            max-width: 400px;
            margin: 0 auto 100px;
            border-radius: 4px;
        }

        .rsvp-box h2 { font-family: 'Cinzel'; letter-spacing: 10px; font-size: 1.5rem; }

        input, select {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 15px 0; margin-bottom: 30px; color: white;
            font-family: 'Montserrat'; outline: none; font-size: 0.8rem;
        }

        .btn {
            background: var(--gold-luxe); color: white; border: none;
            padding: 20px; width: 100%; font-family: 'Cinzel';
            letter-spacing: 4px; cursor: pointer; text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .hero h1 { font-size: 5rem; }
            .hero p { letter-spacing: 6px; font-size: 0.7rem; }
            .timer-grid { gap: 12px; }
            .time-num { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Dannielle's</h1>
        <p>Eighteenth Birthday</p>
    </section>

    <section class="spacing-block">
        <div style="font-family: 'Cinzel'; letter-spacing: 10px; color: var(--gold-luxe);">09 . MAY . 2026</div>
        
        <div class="timer-grid">
            <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-num" id="mins">00</span><span class="time-label">Min</span></div>
            <div class="time-box"><span class="time-num" id="secs">00</span><span class="time-label">Sec</span></div>
        </div>
    </section>

    <section class="venue-section">
        <div class="venue-title">PARINI PRIVATE RESORT</div>
        <div class="address">44 Atis St. Aurora Subdivision, Angono, Rizal</div>
        <iframe class="map-frame" 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3862.062438510842!2d121.1444158!3d14.5385149!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3397c65f97371f6d%3A0x6a94827526978502!2s44%20Atis%2C%20Angono%2C%201930%20Rizal!5e0!3m2!1sen!2sph!4v1713264000000!5m2!1sen!2sph" 
            allowfullscreen="" loading="lazy"></iframe>
    </section>

    <section class="dress-code">
        <div style="font-family: 'Cinzel'; letter-spacing: 6px; font-size: 0.9rem;">DRESS CODE</div>
        <div class="swatch-row">
            <div class="swatch" style="background: var(--p1);"></div>
            <div class="swatch" style="background: var(--p2);"></div>
            <div class="swatch" style="background: var(--p3);"></div>
            <div class="swatch" style="background: var(--p4);"></div>
        </div>
        <div style="font-size: 0.7rem; letter-spacing: 2px; color: var(--soft-taupe);">FORMAL / SEMI-FORMAL</div>
        <div style="font-size: 0.6rem; color: var(--gold-luxe); margin-top: 15px; font-weight: 600;">STRICTLY NO DENIM OR SHORTS</div>
    </section>

    <div class="rsvp-box">
        <h2>RSVP</h2>
        <p style="font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 40px; color: var(--soft-taupe);">KINDLY RESPOND BY APRIL 20</p>
        <form action="https://formspree.io/f/mbdqroed" method="POST">
            <input type="text" name="name" placeholder="FULL NAME" required>
            <select name="attendance" required>
                <option value="" disabled selected>ATTENDANCE</option>
                <option value="Accepted">Will Attend</option>
                <option value="Declined">Will Not Attend</option>
            </select>
            <button type="submit" class="btn">Confirm</button>
        </form>
    </div>

    <script>
        const targetDate = new Date("May 9, 2026 18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) return;
            document.getElementById("days").innerText = Math.floor(distance / 86400000).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.floor((distance % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.floor((distance % 60000) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
