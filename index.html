<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dannielle's 18th | A Night of Radiance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Monsieur+La+Doulaise&family=Montserrat:wght@200;300;400;600&display=swap');

        :root {
            --nude-bg: #FAF5F2;
            --gold-luxe: #C5A059; 
            --deep-espresso: #2D241E;
            --soft-taupe: #8E847C;
            --p1: #F4E4E1; --p2: #E8D5CC; --p3: #DDC3B6; --p4: #C2A69A;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--nude-bg);
            color: var(--deep-espresso);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- SCREEN 1: THE RADIANT HEADING --- */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .invite-intro {
            letter-spacing: 6px;
            font-weight: 300;
            font-size: 0.7rem;
            color: var(--soft-taupe);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        h1.gold-name {
            font-family: 'Monsieur La Doulaise', cursive;
            font-size: clamp(5rem, 28vw, 11rem);
            color: var(--gold-luxe);
            margin: 0;
            font-weight: 400;
            line-height: 0.9;
            filter: drop-shadow(0 5px 15px rgba(197, 160, 89, 0.2));
        }

        .sub-title {
            font-family: 'Cinzel', serif;
            letter-spacing: 12px;
            font-size: 0.9rem;
            color: var(--deep-espresso);
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* --- SCREEN 2: THE COUNTDOWN --- */
        .countdown-section {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 60px 20px;
        }

        .date-display {
            font-family: 'Cinzel';
            letter-spacing: 10px;
            font-size: 1.5rem;
            color: var(--gold-luxe);
            margin-bottom: 40px;
        }

        .timer-row {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        .timer-item { display: flex; flex-direction: column; min-width: 60px; }

        .timer-val {
            font-family: 'Cinzel';
            font-size: 2rem;
            color: var(--deep-espresso);
            font-weight: 400;
        }

        .timer-lbl {
            font-size: 0.55rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--soft-taupe);
            margin-top: 8px;
        }

        /* --- VENUE & MAP --- */
        .venue-area { padding: 100px 0 0 0; background: var(--nude-bg); }
        .venue-name { font-family: 'Cinzel'; letter-spacing: 7px; font-size: 1.3rem; margin-bottom: 10px; }
        .venue-addr { font-size: 0.8rem; color: var(--soft-taupe); margin-bottom: 50px; padding: 0 20px; line-height: 1.6; }

        .map-wrap {
            width: 100%;
            height: 450px;
            filter: grayscale(0.4) contrast(1.1) brightness(0.95);
        }

        /* --- DRESS CODE --- */
        .dress-section { padding: 120px 30px; background: white; }
        .dress-title { font-family: 'Cinzel'; letter-spacing: 10px; font-size: 1.2rem; margin-bottom: 40px; }
        
        .color-palette { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 40px;
        }
        
        .dot { 
            width: 35px; height: 35px; border-radius: 50%; 
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .dress-quote {
            font-style: italic;
            font-size: 0.95rem;
            color: var(--soft-taupe);
            line-height: 2;
            max-width: 320px;
            margin: 0 auto;
        }

        /* --- RSVP --- */
        .rsvp-section { padding: 60px 20px 120px; background: var(--nude-bg); }
        .rsvp-card {
            max-width: 450px;
            margin: 0 auto;
            background: var(--deep-espresso);
            color: white;
            padding: 80px 40px;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .rsvp-card h2 { font-family: 'Cinzel'; letter-spacing: 12px; font-size: 2rem; margin: 0 0 40px; }

        input, select {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 15px 0; margin-bottom: 30px; color: white;
            font-family: 'Montserrat'; outline: none; font-size: 0.9rem;
        }

        .confirm-button {
            background: var(--gold-luxe);
            color: white; border: none; padding: 22px; width: 100%;
            font-family: 'Cinzel'; letter-spacing: 6px; cursor: pointer;
            font-weight: 700; transition: 0.4s;
        }

        .confirm-button:hover { background: #b08d4a; }

        @media (max-width: 480px) {
            h1.gold-name { font-size: 5.5rem; }
            .sub-title { letter-spacing: 6px; font-size: 0.75rem; }
            .timer-row { gap: 15px; }
            .timer-val { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <p class="invite-intro">You are invited to celebrate</p>
        <h1 class="gold-name">Dannielle's</h1>
        <p class="sub-title">Eighteenth Birthday</p>
    </section>

    <section class="countdown-section">
        <div class="date-display">MAY 09 . 2026</div>
        
        <div class="timer-row" id="timer">
            <div class="timer-item"><span class="timer-val" id="days">00</span><span class="timer-lbl">Days</span></div>
            <div class="timer-item"><span class="timer-val" id="hours">00</span><span class="timer-lbl">Hrs</span></div>
            <div class="timer-item"><span class="timer-val" id="mins">00</span><span class="timer-lbl">Min</span></div>
            <div class="timer-item"><span class="timer-val" id="secs">00</span><span class="timer-lbl">Sec</span></div>
        </div>
    </section>

    <section class="venue-area">
        <div class="venue-name">PARINI PRIVATE RESORT</div>
        <div class="venue-addr">44 Atis St. Aurora Subdivision, Angono, Rizal</div>
        
        <iframe class="map-wrap" 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3861.9834169641755!2d121.15174367584557!3d14.542967178486045!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3397c77d61b3699b%3A0x6a0c5c4f2e9d2d0!2s44%20Atis%20St%2C%20Angono%2C%20Rizal!5e0!3m2!1sen!2sph!4v1710000000000" 
            style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <section class="dress-section">
        <div class="dress-title">DRESS CODE</div>
        
        <div class="color-palette">
            <div class="dot" style="background: var(--p1);"></div>
            <div class="dot" style="background: var(--p2);"></div>
            <div class="dot" style="background: var(--p3);"></div>
            <div class="dot" style="background: var(--p4);"></div>
        </div>

        <p class="dress-quote">
            "Wear your best attire and celebrate with us in elegance."<br>
            <span style="font-size: 0.7rem; letter-spacing: 3px; font-weight: 600; color: var(--gold-luxe); text-transform: uppercase; display: block; margin-top: 25px;">
                Strictly No: Denim or Shorts
            </span>
        </p>
    </section>

    <div class="rsvp-section">
        <div class="rsvp-card">
            <h2>RSVP</h2>
            <p style="font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 50px; color: var(--soft-taupe); text-transform: uppercase;">By April 20, 2026</p>
            
            <form action="https://formspree.io/f/mbdqroed" method="POST">
                <input type="text" name="Guest" placeholder="FULL NAME" required>
                <select name="Status" required>
                    <option value="" disabled selected>ATTENDANCE</option>
                    <option value="Yes">Accepted</option>
                    <option value="No">Declined</option>
                </select>
                <button type="submit" class="confirm-button">Confirm Presence</button>
            </form>
        </div>
    </div>

    <script>
        const targetDate = new Date("May 9, 2026 18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) return;
            document.getElementById("days").innerText = Math.floor(distance / 86400000).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.floor((distance % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.floor((distance % 60000) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
